<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>経営コースモデル診断</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">

    <!-- TOP -->
    <section id="view-top" class="view is-active" aria-label="トップ">
      <header class="header">
        <h1 class="title">KEIEI NAVI</h1>
      </header>

      <div class="card">
        <p class="lead">what’s this?</p>
        <p class="desc">アプリの概要が入ります</p>
        <p class="desc">アプリの概要が入ります</p>
        <p class="desc">アプリの概要が入ります</p>
        <p class="desc">アプリの概要が入ります</p>
      </div>

      <div class="notice card">
        <p>回答所要時間は、約３分です。</p>
        <p>なお、このアンケートでは、個人を特定するための情報収集はしておりません。</p>
        <p>匿名での回答となります。</p>
      </div>

      <div class="actions">
        <button id="btn-start" class="btn primary">Start</button>
      </div>
    </section>

    <!-- 診断 -->
    <section id="view-quiz" class="view" aria-label="回答">
      <header class="header sticky">
        <button id="btn-back-to-top" class="btn ghost" type="button">← back</button>

        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progress-text">0 / 0</span>
            <span id="progress-remaining">残り 0</span>
          </div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
      </header>

      <div class="content">
        <h2 class="subtitle">Title</h2>
        <div id="questions" class="questions"></div>

        <div class="actions bottom">
          <button id="btn-to-result" class="btn primary" disabled>診断結果へ</button>
        </div>
      </div>
    </section>

    <!-- 結果 -->
    <section id="view-result" class="view" aria-label="結果">
      <header class="header">
        <h2 class="subtitle">Title</h2>
      </header>

      <div class="content">
        <p class="result-lead">あなたにぴったりのコースモデルは……</p>

        <div id="ranking" class="ranking"></div>

        <div class="actions">
          <button id="btn-retry" class="btn primary">もう一度診断する</button>
          <button id="btn-home" class="btn secondary">タイトルへ戻る</button>
        </div>
      </div>
    </section>

    <!-- ローディング/エラー -->
    <div id="toast" class="toast" hidden></div>

  </main>

  <!-- CSVパース -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <script type="module" src="./app.js"></script>
</body>
</html>
